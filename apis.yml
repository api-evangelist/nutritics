aid: nutritics
name: Nutritics
description: >-
  Nutritics provides a real-time food and nutrition data API offering access to
  over one million foods (generic, branded, and recipes), up to 258 nutrient
  parameters, allergen data, and regional compliance options across the EU,
  US, Australia, New Zealand, and South Africa.
